name: Build and deploy Node.js app to Azure Web App - app-gooum-backend

on:
    push:
        branches:
            - dev
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js version
              uses: actions/setup-node@v4
              with:
                  node-version: "24.x"

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Prepare deploy package
              run: |
                  mkdir deploy
                  cp -r dist deploy/
                  cp package.json deploy/
                  cp package-lock.json deploy/
                  cd deploy
                  npm ci --omit=dev

            - name: Upload artifact for deployment job
              uses: actions/upload-artifact@v4
              with:
                  name: node-app
                  path: deploy

    deploy:
        runs-on: ubuntu-latest
        needs: build
        permissions:
            id-token: write
            contents: read

        steps:
            - name: Download artifact from build job
              uses: actions/download-artifact@v4
              with:
                  name: node-app

            - name: Login to Azure
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_60AE18FC53E6417EB22797914C199E91 }}
                  tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F33F6DC9D0B14889A15AFBA6F67915D8 }}
                  subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F052293151A34ECCA3A1C046496E3A93 }}

            - name: "Deploy to Azure Web App"
              id: deploy-to-webapp
              uses: azure/webapps-deploy@v3
              with:
                  app-name: "app-gooum-backend"
                  slot-name: "Production"
                  package: .
